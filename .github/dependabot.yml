version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
      
    open-pull-requests-limit: 15
    
    labels:
      - "dependencies"
      - "gradle"
      - "version-catalog"
    
    commit-message:
      prefix: "deps"
      include: "scope"
    
    groups:
      kotlin-ecosystem:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
        update-types:
          - "minor"
          - "patch"
          
      android-core:
        patterns:
          - "androidx.core*"
          - "androidx.lifecycle*"
          - "androidx.activity*"
        update-types:
          - "minor"
          - "patch"
      
      compose-ecosystem:
        patterns:
          - "androidx.compose*"
          - "org.jetbrains.kotlin.plugin.compose"
        update-types:
          - "minor"
          - "patch"
    
  - package-ecosystem: "gradle"
    directory: "/gradle/wrapper"
    schedule:
      interval: "monthly"
    labels:
      - "gradle-wrapper"
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "github-actions"
      - "dependencies"
